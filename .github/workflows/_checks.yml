name: checks

# Reusable workflow: lint, typecheck, and test.
# Called by preview.yml, test.yml, and prod.yml so the gates stay identical
# across environments.

on:
  workflow_call:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: install
        run: pip install -e ".[dev]"
      - name: ruff
        run: ruff check .

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    # mypy is informational while the codebase is brought to a clean baseline.
    # Flip continue-on-error off (or remove it) once the count is at zero.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: install
        run: pip install -e ".[dev]"
      - name: mypy
        run: mypy src

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: install
        run: pip install -e ".[dev]"
      - name: pytest
        run: pytest -q
